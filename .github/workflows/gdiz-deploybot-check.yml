name: GDIZ DeployBot Check

on:
  push:
    paths:
      - "apps/web/**"
      - ".github/workflows/gdiz-deploybot-check.yml"
  pull_request:
    paths:
      - "apps/web/**"

jobs:
  deploybot-check:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Run DeployBot readiness check
        run: npm run deploybot:check

      - name: Build project
        run: npm run build
